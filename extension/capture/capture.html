<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TrustPulse camera</title>
    <link rel="stylesheet" href="capture.css" />
  </head>
  <body>
    <header>
      <h1>TrustPulse</h1>
    </header>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" class="hidden"></canvas>
    <div id="camera-status" class="camera-status"></div>

    <div class="tabs">
      <button id="tab-login" class="tab active">Login</button>
      <button id="tab-enroll" class="tab">Enroll</button>
    </div>

    <div id="login-panel">
      <label>Card ID<input id="login-card-id" placeholder="DC0001" /></label>
      <button id="login-capture-btn" disabled>Capture & verify</button>
    </div>

    <div id="enroll-panel" class="hidden">
      <label>Name<input id="enroll-name" placeholder="Jane Doe" /></label>
      <label>Date of birth<input id="enroll-dob" type="date" /></label>
      <button id="enroll-capture-btn" disabled>Capture & enroll</button>
    </div>

    <div id="status-message" class="status"></div>

    <script src="capture.js" type="module"></script>
  </body>
</html>
